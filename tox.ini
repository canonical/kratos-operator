[tox]
skipsdist=True
skip_missing_interpreters = True
envlist = fmt, lint, unit
requires =
    tox-uv

[vars]
src_path = {toxinidir}/src/
tst_path = {toxinidir}/tests/
lib_path = {toxinidir}/lib/charms/kratos
all_path = {[vars]src_path} {[vars]tst_path} {[vars]lib_path}

[testenv]
base_python = python3.10
setenv =
  PYTHONPATH = {toxinidir}:{toxinidir}/lib:{[vars]src_path}
  PYTHONBREAKPOINT=ipdb.set_trace
  PY_COLORS=1
passenv =
  PYTHONPATH
  CHARM_BUILD_DIR
  MODEL_SETTINGS
runner = uv-venv-lock-runner

[testenv:py]
description = Prepare local development tools
dependency_groups = dev
commands =
    pre-commit install -t commit-msg

[testenv:fmt]
description = Apply coding style standards
dependency_groups = fmt
commands =
    isort {[vars]all_path}
    ruff format {[vars]all_path}

[testenv:lint]
description = Check code against coding style standards
dependency_groups = lint
commands =
    codespell {toxinidir}/
    isort --check-only --diff {[vars]all_path}
    ruff check --show-fixes {[vars]all_path}

[testenv:unit]
description = Run unit tests
dependency_groups = unit
commands =
    coverage run --source={[vars]src_path},{[vars]lib_path} \
        -m pytest --ignore={[vars]tst_path}integration -vv --tb native -s {posargs}
    coverage report
    coverage xml

[testenv:integration]
description = Run integration tests
pass_env =
    CHARM_PATH
dependency_groups = integration
commands =
    pytest -v --tb native {[vars]tst_path}integration --log-cli-level=INFO --log-disable=jubilant.wait -s {posargs}

