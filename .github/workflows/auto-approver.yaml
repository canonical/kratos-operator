name: auto-approver
run-name: CI for approving PRs

on:
  push:
    branches:
      - "renovate/**"
      - "automated-update-charm-libs"

jobs:
  auto-approve:
    name: Auto-approve and merge pull request
    uses: canonical/identity-team/.github/workflows/pr-auto-approval.yaml@15ddf22d348a6ca76a7d82dc702c71ab083f9a80 # v1.13.0
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
