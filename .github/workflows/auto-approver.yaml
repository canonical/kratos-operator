name: auto-approver
run-name: CI for approving PRs

on:
  push:
    branches:
      - "renovate/**"
      - "automated-update-charm-libs"

jobs:
  auto-approve:
    name: Auto-approve and merge pull request
    uses: canonical/identity-team/.github/workflows/pr-auto-approval.yaml@b5070d98993fa72f429f4fdf8010f6f9a94eb4e0 # v1.14.2
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
