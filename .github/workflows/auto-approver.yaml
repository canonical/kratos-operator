name: auto-approver
run-name: CI for approving PRs

on:
  push:
    branches:
      - "renovate/**"
      - "automated-update-charm-libs"

jobs:
  auto-approve:
    name: Auto-approve and merge pull request
    uses: canonical/identity-team/.github/workflows/pr-auto-approval.yaml@4d788b23e3fe1df0c3f86c2632a02a2754752487 # v1.14.0
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
