name: auto-approver
run-name: CI for approving PRs

on:
  push:
    branches:
      - "renovate/**"
      - "automated-update-charm-libs"

jobs:
  auto-approve:
    name: Auto-approve and merge pull request
    uses: canonical/identity-team/.github/workflows/pr-auto-approval.yaml@5830f3e6723de07cb5b7ccb6c84031d8b2964c62 # v1.11.4
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
