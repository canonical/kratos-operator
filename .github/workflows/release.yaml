name: release

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - "track/**"

permissions:
    contents: write
    pull-requests: write

jobs:
  release:
      name: release
      uses: canonical/identity-team/.github/workflows/charm-release.yaml@b5070d98993fa72f429f4fdf8010f6f9a94eb4e0 # v1.14.2
      secrets:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
