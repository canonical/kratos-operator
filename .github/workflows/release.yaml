name: release

on:
  workflow_dispatch:
  push:
    branches:
    - main
    - "track/**"

permissions:
    contents: write
    pull-requests: write

jobs:
  release:
      name: release
      uses: canonical/identity-team/.github/workflows/charm-release.yaml@4d788b23e3fe1df0c3f86c2632a02a2754752487 # v1.14.0
      secrets:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
