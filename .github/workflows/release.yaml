    - "track/**"

permissions:
    contents: write
    pull-requests: write

jobs:
  release:
      name: release
      uses: canonical/identity-team/.github/workflows/charm-release.yaml@15ddf22d348a6ca76a7d82dc702c71ab083f9a80 # v1.13.0
      secrets:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
