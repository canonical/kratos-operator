name: On Schedule
on:
  schedule:
    - cron: '0 8 * * MON'

jobs:
  update-charm-libs:
    name: Update Charm Libraries
    uses: canonical/identity-team/.github/workflows/charm-libs-update.yaml@d64b860c8679d3539f5f35f3d2494c419d8e41b5 # v1.12.2
    secrets:
      CHARMCRAFT_CREDENTIALS: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  tests:
    name: CI
    uses: canonical/identity-team/.github/workflows/charm-pull-request.yaml@d64b860c8679d3539f5f35f3d2494c419d8e41b5 # v1.12.2
    with:
      container-name: "kratos"
      use-charmcraftcache: true
