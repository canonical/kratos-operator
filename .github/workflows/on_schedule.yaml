name: On Schedule
on:
  schedule:
    - cron: '0 8 * * MON'

jobs:
  update-charm-libs:
    name: Update Charm Libraries
    uses: canonical/identity-team/.github/workflows/charm-libs-update.yaml@b5070d98993fa72f429f4fdf8010f6f9a94eb4e0 # v1.14.2
    secrets:
      CHARMCRAFT_CREDENTIALS: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  tests:
    name: CI
    uses: canonical/identity-team/.github/workflows/charm-pull-request.yaml@b5070d98993fa72f429f4fdf8010f6f9a94eb4e0 # v1.14.2
    with:
      container-name: "kratos"
      use-charmcraftcache: true
